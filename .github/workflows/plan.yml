name: Plan Phase Assigner

on:
    issues:
        types: [labeled]

permissions:
    issues: write

jobs:
    assign-copilot-on-plan:
        if: github.event.label.name == 'phase:plan'
        runs-on: ubuntu-latest
        steps:
            - name: Comment then assign Copilot to issue
              uses: actions/github-script@v7
              env:
                  COPILOT_ASSIGNEE: copilot
              with:
                  script: |
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: '@copilot Plan Agentを起動してください。Plan Agentが作業を完了したら必ず [PLAN_CREATED] を Issue コメントに投稿してください。'
                      });

                      const assignee = process.env.COPILOT_ASSIGNEE || 'copilot';
                      try {
                        await github.rest.issues.addAssignees({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          assignees: [assignee]
                        });
                      } catch (error) {
                        core.warning(`Could not assign ${assignee}: ${error.message}`);
                      }